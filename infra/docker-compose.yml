# DOC
# Ollama models: https://ollama.com/search
# Pull model: 
#     ollama run llama3.2:1b
#     docker exec -it ollama ollama pull llama3.2:1b

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    logging:
      driver: "json-file"
      options:
        max-file: "2"
        max-size: "1m"
    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 16G
          pids: 100
        reservations:
          cpus: '8'
          memory: 16G
          devices:
            - driver: nvidia
              count: all
              capabilities: [ gpu ]

  webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: webui
    restart: unless-stopped
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    depends_on:
      - ollama
    ports:
      - "3000:8080"
    volumes:
      - open-webui_data:/app/backend/data
    logging:
      driver: "json-file"
      options:
        max-file: "2"
        max-size: "1m"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
          pids: 100
        reservations:
          cpus: '1'
          memory: 1G

volumes:
  ollama_data:
  open-webui_data:
